workflows:
  android-debug:
    name: Build Debug APK
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      groups:
        - google_play
    scripts:
      - name: Set up JDK 17
        script: |
          java -version
      - name: Build debug APK
        script: |
          cd $CM_BUILD_DIR
          gradle assembleDebug --no-daemon
    artifacts:
      - app/build/outputs/apk/debug/*.apk
